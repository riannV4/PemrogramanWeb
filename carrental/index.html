<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Rental</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <div id="search">

        <header class="header">
        <nav class="navigasi">
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Contact</a></li>
            </ul>
        </nav>
        </header>

      <div class="title">
        <h1>Car Rental</h1>
        <p>Find the perfect car for your next adventure</p>
        <hr />
      </div>
      <div class="form-container">
        <div class="form-group">
          <label for="pickup">Rental Location:</label>
          <select id="pickup" name="pickup">
            <option value="">Select Location</option>
            <option value="location1">Yogyakarta</option>
            <option value="location2">Bali</option>
          </select>
        </div>
        <div class="form-group">
          <label for="pickup-date">Rental Start Date:</label>
          <input type="date" id="pickup-date" name="pickup-date" />
        </div>
        <div class="form-group">
          <label for="return-date">Rental End Date:</label>
          <input type="date" id="return-date" name="return-date" />
        </div>
        <button type="submit">Search</button>
      </div>
    </div>

    <div class="car-list">
      <h2>Car List</h2>
      <div class="car-item">
        <img src="car1.jpg" alt="Car 1" />
        <h3>Pisang Balap</h3>
        <p>Rp 100.000/hari</p>
      </div>
      <div class="car-item">
        <img src="car2.jpg" alt="Car 2" />
        <h3>Bombastic side eye</h3>
        <p>Rp 150.000/hari</p>
      </div>
      <div class="car-item">
        <img src="supraaa.jpg" alt="Car 2" />
        <h3>SUPPPRAAA</h3>
        <p>Rp 200.000/hari</p>
      </div>
      <div class="car-item">
        <img src="car3.jpg" alt="Car 2" />
        <h3>Mobil Kombinasi</h3>
        <p>Rp 120.000/hari</p>
      </div>
    </div>

    <div class="question">
      <h2>Have any questions?</h2>

      <form action="/submit" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required /><br /><br />

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required /><br /><br />

        <label for="message">Message:</label><br />
        <textarea
          id="message"
          name="message"
          rows="4"
          cols="50"
          required
        ></textarea><br /><br />

        <input type="submit" value="Submit" />
    </div>
  </body>
</html>
